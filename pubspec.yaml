  name: bella_color
  description: "Sistema de turnos para salones de belleza - Programación JJ"
  publish_to: 'none'
  version: 1.0.0+1

  environment:
    sdk: ^3.10.0

  dependencies:
    flutter:
      sdk: flutter

    cupertino_icons: ^1.0.8
    supabase_flutter: ^2.8.4
    http: ^1.3.0
    url_launcher: ^6.3.1
    image_picker: ^1.1.2
    flex_color_picker: ^3.6.0
    pdf: ^3.10.8
    printing: ^5.13.3
    video_player: ^2.9.3
    simple_barcode_scanner: ^0.2.5
    google_fonts: ^6.2.1
    shared_preferences: ^2.5.5
    table_calendar: ^3.1.2

  dev_dependencies:
    flutter_test:
      sdk: flutter
    flutter_lints: ^6.0.0

  flutter:
    uses-material-design: true
    assets:
      - assets/images/logo_chica.png
    fonts:
      - family: Termina
        fonts:
          - asset: assets/fonts/termina-medium.ttf
            weight: 500
          - asset: assets/fonts/termina-demi.ttf
            weight: 600
          - asset: assets/fonts/termina-bold.ttf
            weight: 700
          - asset: assets/fonts/termina-heavy.ttf
            weight: 800
      - family: AntiqueOliveNord
        fonts:
          - asset: assets/fonts/antique-olive-nord-ita.otf
            style: italic

